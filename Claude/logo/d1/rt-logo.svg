<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-25 -25 1050 1062" width="2000" height="2000" role="img" aria-labelledby="t d">
  <title id="t">RailTime RT Logo — Claude D1</title>
  <desc id="d">RT-Monogramm mit glänzend signalrotem R und matt-metallischem anthrazitfarbenem T, schmale Fuge, transparenter Hintergrund.</desc>

  <defs>
    <linearGradient id="red-face" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#ff2144"/>
      <stop offset="0.45" stop-color="#e4002b"/>
      <stop offset="1" stop-color="#ba0023"/>
    </linearGradient>
    <linearGradient id="dark-face" x1="0.1" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#464c55"/>
      <stop offset="0.5" stop-color="#2b3037"/>
      <stop offset="1" stop-color="#171b20"/>
    </linearGradient>
  </defs>

  <!--
    Claude-D1-Geometrie (0..1000):
    - 16 Einheiten schmale, gleichmäßige Fuge rund um das T (auch oben)
    - identische Konturen wie rt-logo.glb (build-logo-glb.mjs)
  -->
  <g id="RT_Logo">
    <!-- Schmale sichtbare Tiefe: dunklere, leicht versetzte Rückflächen -->
    <g transform="translate(0 12)">
      <path d="M0 0H738L862 152V462L755 583H617L1000 1000H731L446 658V396H650L696 350V216L654 174H0Z" fill="#8f0a1f"/>
      <path d="M0 396H219V1000H0Z" fill="#8f0a1f"/>
      <path d="M0 190H680V380H430V1000H235V380H0Z" fill="#0a0d11"/>
    </g>

    <!-- T, Anthrazit matt-metallisch -->
    <path id="T_Dark" d="M0 190H680V380H430V1000H235V380H0Z" fill="url(#dark-face)"/>

    <!-- R, Signalrot glänzend -->
    <g id="R_Red" fill="url(#red-face)">
      <path d="M0 0H738L862 152V462L755 583H617L1000 1000H731L446 658V396H650L696 350V216L654 174H0Z"/>
      <path d="M0 396H219V1000H0Z"/>
    </g>

    <!-- Dezente Lichtkanten oben (Glanz), ohne Kontur-Rahmen -->
    <g fill="#ffffff" opacity="0.22">
      <path d="M0 0H738L862 152L851 161L733 9H0Z"/>
      <path d="M0 190H680V199H0Z" opacity="0.5"/>
      <path d="M0 396H219V405H0Z"/>
    </g>
  </g>
</svg>
