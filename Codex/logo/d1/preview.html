<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RailTime D1 – GLB-Vorschau</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; overflow: hidden; background: radial-gradient(circle at 50% 38%, #29303a, #090c11 68%); }
    canvas { display: block; width: 100vw; height: 100vh; }
    .caption { position: fixed; left: 22px; bottom: 18px; z-index: 2; color: #f4f2ed; letter-spacing: .04em; pointer-events: none; }
    .caption strong { display: block; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; }
    .caption span { color: #aeb4bd; font-size: 12px; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="caption"><strong>RailTime RT · D1</strong><span>Ziehen zum Drehen · Mausrad zum Zoomen</span></div>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.01, 100);
    camera.position.set(0.15, 0.08, 2.35);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 1.25;
    controls.maxDistance = 4;

    scene.add(new THREE.HemisphereLight(0xf6f8ff, 0x171014, 1.75));
    const key = new THREE.DirectionalLight(0xffffff, 3.2);
    key.position.set(-1.8, 2.6, 3.5);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xe4002b, 2.1);
    rim.position.set(2.7, -0.7, 1.4);
    scene.add(rim);

    let logo;
    const loader = new GLTFLoader();
    loader.load('./rt-logo.glb', ({ scene: model }) => {
      logo = model.getObjectByName('RT_Logo') ?? model;
      scene.add(model);
    }, undefined, (error) => {
      console.error('rt-logo.glb konnte nicht geladen werden.', error);
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      if (logo && !controls.state) {
        logo.rotation.y = Math.sin(clock.getElapsedTime() * 0.55) * 0.28;
      }
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
